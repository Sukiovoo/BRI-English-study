<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>长短语音频源测试</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0b0f1a; color: #e8eaf0; font-family: 'Segoe UI', Arial, sans-serif; padding: 16px; }
h2 { color: #f0c040; font-size: 18px; margin-bottom: 6px; }
p  { font-size: 12px; color: #8896b3; margin-bottom: 18px; line-height: 1.6; }
.card { background: #111827; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.name { font-size: 13px; color: #4fc3f7; font-weight: 600; margin-bottom: 4px; }
.note { font-size: 11px; color: #6b7a99; margin-bottom: 8px; }
button { background: rgba(79,195,247,0.1); border: 1px solid rgba(79,195,247,0.3); color: #4fc3f7; border-radius: 6px; padding: 8px 14px; cursor: pointer; font-size: 12px; }
.ok  { background: rgba(52,211,153,0.15) !important; color: #34d399 !important; border-color: rgba(52,211,153,0.4) !important; }
.err { background: rgba(248,113,113,0.12) !important; color: #f87171 !important; border-color: rgba(248,113,113,0.3) !important; }
.status { font-size: 11px; margin-top: 6px; color: #6b7a99; }
.winner { border-color: #34d399 !important; background: rgba(52,211,153,0.05) !important; }
#summary { background: rgba(240,192,64,0.1); border: 1px solid rgba(240,192,64,0.3); border-radius: 10px; padding: 14px; margin-top: 16px; display: none; }
</style>
</head>
<body>
<h2>🔊 长短语音频源测试</h2>
<p>测试：<strong style="color:#fff">AI Interactive 3D Digital Work Design</strong><br>
逐个点播放，能完整读出整句的标 ✅</p>
<div id="cards"></div>
<div id="summary"></div>
<script>
const PHRASE = 'AI Interactive 3D Digital Work Design';
const enc = encodeURIComponent(PHRASE);
const sources = [
  { name: 'Google TTS (gtx)',      note: '免费，支持长句',        url: `https://translate.googleapis.com/translate_tts?ie=UTF-8&q=${enc}&tl=en-US&client=gtx&ttsspeed=0.9` },
  { name: 'Google TTS (tw-ob)',    note: '备用参数',              url: `https://translate.google.com/translate_tts?ie=UTF-8&q=${enc}&tl=en&client=tw-ob` },
  { name: 'StreamElements - Joanna', note: '美式女声',            url: `https://api.streamelements.com/kappa/v2/speech?voice=Joanna&text=${enc}` },
  { name: 'StreamElements - Matthew',note: '美式男声',            url: `https://api.streamelements.com/kappa/v2/speech?voice=Matthew&text=${enc}` },
  { name: 'StreamElements - Amy',  note: '英式女声',              url: `https://api.streamelements.com/kappa/v2/speech?voice=Amy&text=${enc}` },
  { name: 'StreamElements - Brian',note: '英式男声',              url: `https://api.streamelements.com/kappa/v2/speech?voice=Brian&text=${enc}` },
  { name: '有道（整句测试）',        note: '看看长句是否支持',      url: `https://dict.youdao.com/dictvoice?audio=${enc}&type=2` },
];
const container = document.getElementById('cards');
let currentAudio = null;
let winners = [];
sources.forEach((src, i) => {
  const card = document.createElement('div');
  card.className = 'card'; card.id = `card-${i}`;
  card.innerHTML = `<div class="name">${src.name}</div><div class="note">${src.note}</div>
    <button id="btn-${i}" onclick="testPlay(${i})">▶ 播放</button>
    <div class="status" id="st-${i}">等待测试</div>`;
  container.appendChild(card);
});
function testPlay(i) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  const btn = document.getElementById(`btn-${i}`);
  const st  = document.getElementById(`st-${i}`);
  const card = document.getElementById(`card-${i}`);
  st.textContent = '⏳ 加载...'; btn.textContent = '⏹ 停止'; btn.className = '';
  const audio = new Audio(sources[i].url);
  currentAudio = audio;
  audio.oncanplaythrough = () => { st.textContent = '✅ 可以播放！'; btn.className = 'ok'; card.className = 'card winner'; if (!winners.includes(sources[i].name)) { winners.push(sources[i].name); updateSummary(); } };
  audio.onended = () => { btn.textContent = '▶ 再播'; currentAudio = null; };
  audio.onerror = () => { st.textContent = '❌ 失败'; btn.textContent = '▶ 重试'; btn.className = 'err'; currentAudio = null; };
  audio.play().then(() => { st.textContent = '✅ 正在播放'; btn.className = 'ok'; }).catch(e => { st.textContent = `❌ ${e.message?.slice(0,40)}`; btn.textContent = '▶ 重试'; btn.className = 'err'; currentAudio = null; });
}
function updateSummary() {
  const s = document.getElementById('summary'); s.style.display = 'block';
  s.innerHTML = `<h3 style="color:#f0c040;margin-bottom:8px">✅ 可用来源</h3><p style="color:#c8d4e8;font-size:12px">${winners.join('<br>')}</p><p style="margin-top:8px;color:#f0c040;font-size:12px">截图发给我，我帮你换上！</p>`;
}
</script>
</body>
</html>
